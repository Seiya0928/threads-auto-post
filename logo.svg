<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 背景グラデーション -->
    <radialGradient id="bgGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#2d1f3d"/>
      <stop offset="100%" stop-color="#0f0a1a"/>
    </radialGradient>

    <!-- ドロップグラデーション -->
    <linearGradient id="dropGrad" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#f8c8d8"/>
      <stop offset="100%" stop-color="#c97aaa"/>
    </linearGradient>

    <!-- 葉グラデーション -->
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a8e6cf"/>
      <stop offset="100%" stop-color="#5cb88a"/>
    </linearGradient>

    <!-- 光沢オーバーレイ -->
    <linearGradient id="shineGrad" x1="30%" y1="0%" x2="70%" y2="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- クリップ -->
    <clipPath id="circleClip">
      <circle cx="256" cy="256" r="240"/>
    </clipPath>
  </defs>

  <!-- 背景サークル -->
  <circle cx="256" cy="256" r="256" fill="#0f0a1a"/>
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)"/>

  <!-- 光沢オーバーレイ -->
  <ellipse cx="220" cy="180" rx="180" ry="120" fill="url(#shineGrad)" clip-path="url(#circleClip)"/>

  <!-- 葉（左） -->
  <path d="M 190 310
           C 140 260, 150 180, 210 155
           C 195 210, 205 265, 245 295
           Z"
        fill="url(#leafGrad)" opacity="0.9"/>

  <!-- 葉の中心脈 -->
  <path d="M 210 155 C 215 215, 228 265, 245 295"
        fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.35" stroke-linecap="round"/>

  <!-- 葉（右・小） -->
  <path d="M 270 280
           C 310 240, 320 185, 285 165
           C 278 200, 272 240, 258 268
           Z"
        fill="url(#leafGrad)" opacity="0.65"/>

  <!-- セラム ドロップ -->
  <path d="M 256 130
           C 256 130, 220 185, 220 218
           C 220 245, 236 265, 256 265
           C 276 265, 292 245, 292 218
           C 292 185, 256 130, 256 130 Z"
        fill="url(#dropGrad)"/>

  <!-- ドロップ光沢ハイライト -->
  <ellipse cx="245" cy="185" rx="8" ry="14"
           fill="#ffffff" opacity="0.35" transform="rotate(-15 245 185)"/>

  <!-- スパークル 大 -->
  <g transform="translate(336, 168)" opacity="0.9">
    <line x1="0" y1="-18" x2="0" y2="18" stroke="#f8c8d8" stroke-width="2" stroke-linecap="round"/>
    <line x1="-18" y1="0" x2="18" y2="0" stroke="#f8c8d8" stroke-width="2" stroke-linecap="round"/>
    <line x1="-11" y1="-11" x2="11" y2="11" stroke="#f8c8d8" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="11" y1="-11" x2="-11" y2="11" stroke="#f8c8d8" stroke-width="1.2" stroke-linecap="round"/>
  </g>

  <!-- スパークル 小 -->
  <g transform="translate(168, 200)" opacity="0.6">
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#a8e6cf" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#a8e6cf" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- スパークル 極小 -->
  <g transform="translate(355, 300)" opacity="0.5">
    <line x1="0" y1="-7" x2="0" y2="7" stroke="#f8c8d8" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-7" y1="0" x2="7" y2="0" stroke="#f8c8d8" stroke-width="1.2" stroke-linecap="round"/>
  </g>

  <!-- テキスト: control -->
  <text x="256" y="375"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="48"
        font-weight="200"
        letter-spacing="8"
        text-anchor="middle"
        fill="#ffffff"
        opacity="0.9">control</text>

  <!-- 外枠リング -->
  <circle cx="256" cy="256" r="238"
          fill="none"
          stroke="#c97aaa"
          stroke-width="1"
          stroke-opacity="0.25"/>
</svg>

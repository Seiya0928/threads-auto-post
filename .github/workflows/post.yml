name: Threads 自動投稿

on:
  # 毎日 21:00 JST (= 12:00 UTC)
  schedule:
    - cron: '0 12 * * *'
  # 手動実行も可能（テスト用）
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 依存ライブラリをインストール
        run: pip install -r requirements.txt

      - name: Threads に投稿
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          DEFAULT_HASHTAGS: '#スキンケア #美容 #skincare #美肌 #保湿'
        run: python post_once.py

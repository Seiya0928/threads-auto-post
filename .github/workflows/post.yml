name: Threads 自動投稿

on:
  schedule:
    - cron: '30 22 * * *'   # 07:30 JST（朝の準備時間）
    - cron: '30 12 * * *'   # 21:30 JST（夜のゴールデンタイム）
  workflow_dispatch:         # 手動実行（テスト用）

concurrency:
  group: threads-post
  cancel-in-progress: false  # 同時実行を防ぐ（同じグループの実行は1件ずつ順番に処理）

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write        # A/Bテストログをコミットするために必要
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      FORCE_POST: "true"

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 依存ライブラリをインストール
        run: pip install -r requirements.txt

      - name: Threads に投稿
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID:      ${{ secrets.THREADS_USER_ID }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          AFFILIATE_URL:        ${{ secrets.AFFILIATE_URL }}
        run: python post_once.py

      - name: A/Bテストログをコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/post_log.json
          git diff --staged --quiet || git commit -m "chore: update post log [skip ci]"
          git push

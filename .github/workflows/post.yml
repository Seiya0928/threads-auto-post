name: Threads 自動投稿

on:
  schedule:
    - cron: '0 23 * * *'   # 08:00 JST（朝のルーティン）
    - cron: '0 3 * * *'    # 12:00 JST（昼の毒舌）
    - cron: '0 12 * * *'   # 21:00 JST（夜のガチ解説）
  workflow_dispatch:        # 手動実行（テスト用）

concurrency:
  group: threads-post
  cancel-in-progress: false  # 同時実行を防ぐ（同じグループの実行は1件ずつ順番に処理）

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 依存ライブラリをインストール
        run: pip install -r requirements.txt

      - name: Threads に投稿
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID:      ${{ secrets.THREADS_USER_ID }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          AFFILIATE_URL:        ${{ secrets.AFFILIATE_URL }}
        run: python post_once.py

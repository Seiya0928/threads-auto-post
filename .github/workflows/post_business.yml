name: Threads ビジネス自動投稿

on:
  schedule:
    - cron: '0 0 * * *'    # 09:00 JST（朝）
    - cron: '0 6 * * *'    # 15:00 JST（昼）
    - cron: '0 12 * * *'   # 21:00 JST（夜）
  workflow_dispatch:         # 手動実行（テスト用）

concurrency:
  group: threads-business-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v6

      - name: Python をセットアップ
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 依存ライブラリをインストール
        run: pip install -r requirements.txt

      - name: Threads に投稿
        env:
          BUSINESS_THREADS_ACCESS_TOKEN: ${{ secrets.BUSINESS_THREADS_ACCESS_TOKEN }}
          BUSINESS_THREADS_USER_ID:      ${{ secrets.BUSINESS_THREADS_USER_ID }}
          GROQ_API_KEY:                  ${{ secrets.GROQ_API_KEY }}
          AFFILIATE_URL:                 ${{ secrets.AFFILIATE_URL }}
          CROWDWORKS_AFFILIATE_URL:      ${{ secrets.CROWDWORKS_AFFILIATE_URL }}
          MIDWORKS_AFFILIATE_URL:        ${{ secrets.MIDWORKS_AFFILIATE_URL }}
        run: python main_business.py

      - name: ログをコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/business_post_log.csv data/post_log_business.json data/business_last_info.json data/business_last_hashtag.json || true
          git diff --staged --quiet || git commit -m "chore: update business post log [skip ci]"
          git pull --rebase && git push
